<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Space Dashboard</title>
    <style>
        body {
            background-color: #0b0d1b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { 
            color: #4a90e2; 
            margin-bottom: 5px; 
            text-shadow: 0 0 10px #4a90e2, 0 0 20px #0b0d1b;
        }
        .subtitle { color: #8b9bb4; font-style: italic; margin-bottom: 30px; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #161b33;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        button:hover {
            background: #357abd;
            box-shadow: 0 0 15px #4a90e2;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 15px;
            border: 2px solid #4a90e2;
        }
        p { 
            line-height: 1.6; 
            text-align: left; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace;
            background: #05070f;
            padding: 20px;
            border: 1px solid #39ff14;
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2);
            font-size: 14px;
            white-space: pre-line;
            margin-top: 20px;
        }
        .date { font-weight: bold; color: #4a90e2; text-align: left; }
    </style>
</head>
<body>

    <h1>NASA Astronomy Media Center</h1>
    <div class="subtitle">Stardance Mission Control — Built by @Tailgator</div>
    
    <button onclick="fetchRandomSpace()">Explore Random Cosmic Date</button>

    <div class="container">
        <h2 id="title">Loading Space Discovery...</h2>
        <div id="date" class="date"></div>
        <div id="media-container"></div>
        <h3 style="color: #39ff14; text-align: left; font-family: monospace; margin-top: 30px;">[ > SYSTEM TELEMETRY DATA RECOVERY ]</h3>
        <p id="explanation"></p>
    </div>

    <script>
        const url = "https://api.nasa.gov/planetary/apod?api_key=m89QjMEbnHf6etyZ0muGCg8jA3eY35LLnKuo9jVO";

        function updateDashboard(data) {
            document.getElementById("title").innerText = data.title;
            document.getElementById("date").innerText = "Date: " + data.date;
            document.getElementById("explanation").innerText = data.explanation;

            const mediaContainer = document.getElementById("media-container");
            if(data.media_type === "image") {
                mediaContainer.innerHTML = `<img src="${data.url}" alt="${data.title}">`;
            } else if(data.media_type === "video") {
                mediaContainer.innerHTML = `<iframe width="100%" height="400" src="${data.url}" frameborder="0" allowfullscreen></iframe>`;
            }
        }

        // Initial load
        fetch(url)
            .then(response => response.json())
            .then(data => updateDashboard(data))
            .catch(err => {
                console.error(err);
                document.getElementById("title").innerText = "Failed to load space transmission.";
            });

        function fetchRandomSpace() {
            const year = Math.floor(Math.random() * (2025 - 2015 + 1)) + 2015;
            const month = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
            const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
            const randomDate = `${year}-${month}-${day}`;
            const randomUrl = `https://nasa.gov&date=${randomDate}`;

            document.getElementById("title").innerText = "Intercepting cosmic transmission...";

            fetch(randomUrl)
                .then(res => res.json())
                .then(data => updateDashboard(data))
                .catch(err => console.error(err));
        }
    </script>
</body>
</html>
